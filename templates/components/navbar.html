{% load static %}
<nav class="navbar navbar-expand-lg top-navbar shadow-sm px-4">
  <div class="container-fluid">

    <!-- Sidebar Toggle (mobile) -->
    <button class="btn btn-link text-dark p-0 me-3 sidebar-toggle-btn" id="sidebarToggle" type="button">
      <i class="bi bi-list fs-4"></i>
    </button>

    <!-- Page Title / Breadcrumb -->
    <span class="navbar-text fw-semibold text-dark">
      {{ page_title|default:"Dashboard" }}
    </span>

    <!-- Right side -->
    <div class="ms-auto d-flex align-items-center gap-3">

      <!-- Notifications (placeholder) -->
      <button class="btn btn-light btn-sm position-relative rounded-circle" style="width:38px;height:38px;">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;">3</span>
      </button>

      <!-- User dropdown -->
      <div class="dropdown">
        <button class="btn btn-light btn-sm dropdown-toggle d-flex align-items-center gap-2 rounded-pill px-3"
                type="button" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle fs-5"></i>
          <span class="d-none d-md-inline fw-semibold">{{ user.get_full_name|default:user.username }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li>
            <span class="dropdown-header">
              {{ user.email }}
            </span>
          </li>
          <li>
            <span class="dropdown-item-text small text-muted">
              Role: <strong>{{ user.role }}</strong>
              {% if user.department %} &middot; {{ user.department }}{% endif %}
            </span>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item" href="{% url 'profile' %}">
              <i class="bi bi-person me-2"></i> My Profile
            </a>
          </li>
          {% if user.role == 'ADMIN' %}
          <li>
            <a class="dropdown-item" href="{% url 'settings' %}">
              <i class="bi bi-gear me-2"></i> Settings
            </a>
          </li>
          {% endif %}
          <li><hr class="dropdown-divider"></li>
          <li>
            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
              <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>
