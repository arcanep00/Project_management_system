{% extends "base.html" %}

{% block title %}Delete Employee — ProjectMS{% endblock %}

{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-5 text-center">
        <div class="mb-4">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:4rem;"></i>
        </div>
        <h4 class="fw-bold text-danger mb-2">Delete Employee</h4>
        <p class="text-muted mb-4">
          You are about to permanently delete
          <strong>{{ employee_user.get_full_name|default:employee_user.username }}</strong>.
          This action cannot be undone.
        </p>
        <div class="d-flex gap-3 justify-content-center">
          <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary btn-lg rounded-3">Cancel</a>
          <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg rounded-3">
              <i class="bi bi-trash me-2"></i>Delete
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
