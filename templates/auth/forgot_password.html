{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ProjectMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="auth-page d-flex align-items-center justify-content-center min-vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

        <!-- Brand -->
        <div class="text-center mb-4">
          <i class="bi bi-kanban-fill text-primary" style="font-size: 3rem;"></i>
          <h1 class="h3 fw-bold text-dark mt-2">ProjectMS</h1>
        </div>

        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4 p-md-5">

            <!-- Icon -->
            <div class="text-center mb-4">
              <div class="icon-circle bg-primary bg-opacity-10 mx-auto mb-3" style="width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-lock-fill text-primary fs-2"></i>
              </div>
              <h2 class="h5 fw-bold">Reset Password</h2>
              <p class="text-muted small">
                Enter your registered email address. We'll send you a link to reset your password.
              </p>
            </div>

            {% if messages %}
              {% for message in messages %}
              <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show small" role="alert">
                {{ message }}
                <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
              </div>
              {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'forgot_password' %}" novalidate>
              {% csrf_token %}

              <div class="mb-4">
                <label for="email" class="form-label fw-semibold small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-envelope text-muted"></i>
                  </span>
                  <input type="email" id="email" name="email"
                         class="form-control form-control-lg border-start-0"
                         placeholder="you@example.com" required />
                </div>
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-semibold">
                  <i class="bi bi-send me-2"></i> Send Reset Link
                </button>
              </div>

              <div class="text-center">
                <a href="{% url 'login' %}" class="text-muted small text-decoration-none">
                  <i class="bi bi-arrow-left me-1"></i> Back to Login
                </a>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
