{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | ProjectMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">

  <div class="text-center px-3">
    <div class="mb-4">
      <span class="display-1 fw-bold text-primary">4</span>
      <i class="bi bi-emoji-frown-fill text-warning" style="font-size:5rem;vertical-align:middle;"></i>
      <span class="display-1 fw-bold text-primary">4</span>
    </div>

    <h2 class="fw-bold text-dark mb-2">Page Not Found</h2>
    <p class="text-muted mb-4 lead">
      Oops! The page you're looking for doesn't exist or has been moved.
    </p>

    <div class="d-flex gap-3 justify-content-center flex-wrap">
      {% if user.is_authenticated %}
      <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg rounded-3 px-4">
        <i class="bi bi-house-fill me-2"></i>Go to Dashboard
      </a>
      {% else %}
      <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-3 px-4">
        <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login
      </a>
      {% endif %}
      <button onclick="history.back()" class="btn btn-outline-secondary btn-lg rounded-3 px-4">
        <i class="bi bi-arrow-left me-2"></i>Go Back
      </button>
    </div>

    <p class="mt-5 text-muted small">
      <i class="bi bi-kanban-fill me-1 text-primary"></i>
      <strong>ProjectMS</strong> &mdash; Project Management System
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
